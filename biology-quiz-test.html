<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生物会考冲刺 - 测试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
        }
        .status {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .info { color: #2196f3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 功能测试</h1>
        
        <div class="status" id="status">
            正在初始化...
        </div>
        
        <button class="btn" onclick="test1()">测试1: 检查JavaScript</button>
        <button class="btn" onclick="test2()">测试2: 检查数据</button>
        <button class="btn" onclick="test3()">测试3: 模拟答题</button>
        <button class="btn" onclick="openRealApp()">打开正式版</button>
    </div>

    <script>
        const status = document.getElementById('status');
        let logs = [];
        
        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            logs.push(`[${time}] ${msg}`);
            status.innerHTML = logs.map(l => `<div class="${type}">${l}</div>`).join('');
            status.scrollTop = status.scrollHeight;
            console.log(msg);
        }
        
        function test1() {
            logs = [];
            log('✓ JavaScript正常运行', 'success');
            log(`浏览器: ${navigator.userAgent.split(' ')[0]}`, 'info');
            log(`页面URL: ${window.location.href}`, 'info');
        }
        
        function test2() {
            logs = [];
            try {
                // 测试数据
                const testQuestions = [
                    { id: 1, question: "测试题目", options: ["A", "B", "C", "D"], answer: 0 }
                ];
                log(`✓ 测试数据创建成功`, 'success');
                log(`题目数量: ${testQuestions.length}`, 'info');
            } catch (e) {
                log(`✗ 错误: ${e.message}`, 'error');
            }
        }
        
        function test3() {
            logs = [];
            try {
                log('模拟答题流程...', 'info');
                
                // 模拟数据
                const questions = [
                    { id: 1, question: "细胞膜的作用是什么？", options: ["保护", "控制物质进出", "遗传", "呼吸"], answer: 1 }
                ];
                
                log(`✓ 加载题目成功`, 'success');
                log(`题目: ${questions[0].question}`, 'info');
                log(`选项: ${questions[0].options.join(', ')}`, 'info');
                log(`答案: ${questions[0].options[questions[0].answer]}`, 'success');
                
            } catch (e) {
                log(`✗ 错误: ${e.message}`, 'error');
            }
        }
        
        function openRealApp() {
            log('正在打开正式版...', 'info');
            setTimeout(() => {
                window.location.href = 'biology-quiz.html';
            }, 500);
        }
        
        window.onload = function() {
            log('页面加载完成', 'success');
            log('请依次点击测试按钮', 'info');
        };
    </script>
</body>
</html>
