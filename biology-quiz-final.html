<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生物会考冲刺</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* 首页 */
        #homeScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
        }
        
        .mascot {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: white;
            padding: 10px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(240,147,251,0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        /* 答题页面 */
        #quizScreen {
            display: none;
        }
        
        .quiz-mascot {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            padding: 8px;
            margin: 0 auto 15px;
            display: block;
            animation: bounce 2s infinite;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .quiz-header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }
        
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            color: #666;
        }
        
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .question-header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .question-number {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .question-type {
            background: #f0f0f0;
            color: #666;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .question-text {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 20px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            background: white;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s;
        }
        
        .option:hover:not(.disabled) {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }
        
        .option.wrong {
            border-color: #f44336;
            background: #ffebee;
        }
        
        .option.disabled {
            pointer-events: none;
        }
        
        .option-letter {
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #666;
        }
        
        .option.correct .option-letter {
            background: #4caf50;
            color: white;
        }
        
        .option.wrong .option-letter {
            background: #f44336;
            color: white;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: transform 0.2s;
        }
        
        .nav-btn:active {
            transform: scale(0.95);
        }
        
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .btn-prev {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-home {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        /* 结果页面 */
        #resultScreen {
            display: none;
            text-align: center;
        }
        
        .result-card {
            background: white;
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .result-mascot {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f0f0f0;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        
        .result-detail {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
        }
        
        .result-detail-item {
            text-align: center;
        }
        
        .result-detail-number {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }
        
        .correct { color: #4caf50; }
        .wrong { color: #f44336; }
        
        .result-detail-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .result-message {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homeScreen">
            <img src="image/panda%20mascot%20character%20waving.png" 
                 alt="熊猫" 
                 class="mascot" 
                 onerror="this.style.display='none'">
            
            <h1>生物会考冲刺</h1>
            <p class="subtitle">易错题专项训练</p>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalScore">0</div>
                    <div class="stat-label">总积分</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="streakDays">0</div>
                    <div class="stat-label">连续天数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalQuestions">0</div>
                    <div class="stat-label">做题总数</div>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="startQuiz('choice')">
                📝 选择题闯关
            </button>
            
            <button class="btn btn-secondary" onclick="startQuiz('essay')">
                ✍️ 解答题闯关
            </button>
            
            <button class="btn btn-secondary" onclick="startQuiz('random')">
                🎲 随机挑战
            </button>
        </div>
        
        <!-- 答题页面 -->
        <div id="quizScreen">
            <img src="" alt="吉祥物" class="quiz-mascot" id="quizMascot">
            
            <div class="quiz-header">
                <div class="progress-info">
                    <span id="progressText">第 1 题 / 共 10 题</span>
                    <span id="scoreText">积分: 0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="stats-row">
                    <span>✓ 正确: <span id="correctCount">0</span></span>
                    <span>✗ 错误: <span id="wrongCount">0</span></span>
                    <span>🔥 连击: <span id="comboCount">0</span></span>
                </div>
            </div>
            
            <div class="question-card" id="questionCard"></div>
            
            <div class="nav-buttons">
                <button class="nav-btn btn-prev" onclick="prevQuestion()">← 上一题</button>
                <button class="nav-btn btn-next" onclick="nextQuestion()">下一题 →</button>
                <button class="nav-btn btn-home" onclick="goHome()">🏠 主页</button>
            </div>
        </div>
        
        <!-- 结果页面 -->
        <div id="resultScreen">
            <div class="result-card">
                <img src="" alt="结果" class="result-mascot" id="resultMascot">
                <h2 class="result-title" id="resultTitle">挑战完成！</h2>
                <div class="result-score" id="resultScore">0 分</div>
                
                <div class="result-detail">
                    <div class="result-detail-item">
                        <span class="result-detail-number correct" id="resultCorrect">0</span>
                        <div class="result-detail-label">答对</div>
                    </div>
                    <div class="result-detail-item">
                        <span class="result-detail-number wrong" id="resultWrong">0</span>
                        <div class="result-detail-label">答错</div>
                    </div>
                    <div class="result-detail-item">
                        <span class="result-detail-number" style="color:#667eea" id="resultAccuracy">0%</span>
                        <div class="result-detail-label">正确率</div>
                    </div>
                </div>
                
                <p class="result-message" id="resultMessage">继续努力！</p>
                
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 再来一轮</button>
                <button class="btn btn-secondary" onclick="goHome()">🏠 返回首页</button>
            </div>
        </div>
    </div>

    <script>
        // ====== 题库 ======
        var questions = [
            {
                id: 1,
                question: "把番茄用开水烫一下，可以从其表面撕下一层皮，这层皮和里面的果肉在植物体的结构层次上分别属于（  ）",
                options: ["上皮组织、薄壁组织", "保护组织、薄壁组织", "果皮组织、输导组织", "表皮组织、分生组织"],
                answer: 1,
                analysis: "植物的组织主要有分生组织、保护组织、营养组织等。番茄的皮属于保护组织，果肉属于营养组织（薄壁组织）。"
            },
            {
                id: 2,
                question: "人工智能发展迅猛，人脸识别、人脸支付等逐渐进入人们的生活，这是由于人体面部存在差异，不易改变也不易被复制，下列与人体面部差异的形成有关的细胞结构是（  ）",
                options: ["细胞壁", "细胞膜", "细胞核", "细胞质"],
                answer: 2,
                analysis: "细胞核是细胞遗传性和细胞代谢活动的控制中心，遗传物质主要存在于细胞核中。"
            },
            {
                id: 3,
                question: "蒲草生活在水中。经检测发现，某有毒物质在其细胞内的浓度远远低于周围污水中的浓度。控制该有毒物质进入蒲草细胞的结构是（  ）",
                options: ["细胞壁", "细胞膜", "细胞质", "细胞核"],
                answer: 1,
                analysis: "细胞膜将细胞内部与外部的环境分隔开来，控制物质进出细胞。"
            },
            {
                id: 4,
                question: "下列细胞中，能观察到叶绿体的是（  ）",
                options: ["酵母菌", "洋葱鳞片叶内表皮细胞", "蚕豆叶片细胞", "人口腔上皮细胞"],
                answer: 2,
                analysis: "蚕豆叶片细胞含有叶绿体，能进行光合作用。"
            },
            {
                id: 5,
                question: "用显微镜观察字母\"d\"的玻片，从目镜内看到的物像是（  ）",
                options: ["p", "q", "b", "d"],
                answer: 0,
                analysis: "显微镜看到的物像上下颠倒、左右颠倒。\"d\"旋转180度是\"p\"。"
            }
        ];
        
        // ====== 熊猫图片 ======
        var pandaImages = [
            'image/panda%20mascot%20character%20waving.png',
            'image/panda%20mascot%20character%20sitting.png',
            'image/panda%20mascot%20character%20giving.png',
            'image/panda%20thinking.png',
            'image/happy%20panda.png',
            'image/scientist%20panda.png'
        ];
        
        // ====== 全局变量 ======
        var currentQuestions = [];
        var currentIndex = 0;
        var score = 0;
        var correctCount = 0;
        var wrongCount = 0;
        var combo = 0;
        var answers = [];
        
        // ====== 工具函数 ======
        function shuffle(array) {
            var arr = array.slice();
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
            return arr;
        }
        
        function randomPanda() {
            return pandaImages[Math.floor(Math.random() * pandaImages.length)];
        }
        
        // ====== 核心函数 ======
        function startQuiz(type) {
            console.log('开始答题: ' + type);
            
            currentQuestions = shuffle(questions).slice(0, 5);
            currentIndex = 0;
            score = 0;
            correctCount = 0;
            wrongCount = 0;
            combo = 0;
            answers = new Array(currentQuestions.length).fill(null);
            
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            
            showQuestion();
        }
        
        function showQuestion() {
            var q = currentQuestions[currentIndex];
            
            // 更新熊猫
            var mascot = document.getElementById('quizMascot');
            mascot.src = randomPanda();
            mascot.onerror = function() { this.style.display = 'none'; };
            mascot.style.display = 'block';
            
            // 更新进度
            document.getElementById('progressText').textContent = 
                '第 ' + (currentIndex + 1) + ' 题 / 共 ' + currentQuestions.length + ' 题';
            document.getElementById('progressFill').style.width = 
                (currentIndex / currentQuestions.length * 100) + '%';
            document.getElementById('scoreText').textContent = '积分: ' + score;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('comboCount').textContent = combo;
            
            // 更新导航按钮
            document.querySelector('.btn-prev').disabled = (currentIndex === 0);
            document.querySelector('.btn-next').textContent = 
                (currentIndex === currentQuestions.length - 1) ? '完成 ✓' : '下一题 →';
            
            // 显示题目
            var html = '<div class="question-header">' +
                '<span class="question-number">第 ' + (currentIndex + 1) + ' 题</span>' +
                '<span class="question-type">选择题</span></div>' +
                '<div class="question-text">' + q.question + '</div>' +
                '<div class="options">';
            
            var letters = ['A', 'B', 'C', 'D'];
            for (var i = 0; i < q.options.length; i++) {
                var answered = answers[currentIndex] !== null;
                var classes = 'option';
                if (answered) {
                    classes += ' disabled';
                    if (i === answers[currentIndex]) {
                        classes += (i === q.answer ? ' correct' : ' wrong');
                    }
                    if (i === q.answer && i !== answers[currentIndex]) {
                        classes += ' correct';
                    }
                }
                
                html += '<div class="' + classes + '" onclick="selectAnswer(' + i + ')">' +
                    '<span class="option-letter">' + letters[i] + '</span>' +
                    '<span>' + q.options[i] + '</span></div>';
            }
            
            html += '</div>';
            document.getElementById('questionCard').innerHTML = html;
        }
        
        function selectAnswer(index) {
            var q = currentQuestions[currentIndex];
            if (answers[currentIndex] !== null) return;
            
            answers[currentIndex] = index;
            
            var options = document.querySelectorAll('.option');
            options.forEach(function(opt, i) {
                opt.classList.add('disabled');
                if (i === index) {
                    opt.classList.add(index === q.answer ? 'correct' : 'wrong');
                }
                if (i === q.answer && i !== index) {
                    opt.classList.add('correct');
                }
            });
            
            if (index === q.answer) {
                correctCount++;
                combo++;
                score += 10 + (combo > 1 ? combo * 2 : 0);
            } else {
                wrongCount++;
                combo = 0;
            }
            
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('comboCount').textContent = combo;
            document.getElementById('scoreText').textContent = '积分: ' + score;
        }
        
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }
        
        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= currentQuestions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }
        
        function showResult() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            var accuracy = Math.round((correctCount / currentQuestions.length) * 100);
            
            document.getElementById('resultScore').textContent = score + ' 分';
            document.getElementById('resultCorrect').textContent = correctCount;
            document.getElementById('resultWrong').textContent = wrongCount;
            document.getElementById('resultAccuracy').textContent = accuracy + '%';
            
            var title, message;
            if (accuracy >= 80) {
                title = '太棒了！🎉';
                message = '你已经掌握了这些知识点！';
            } else if (accuracy >= 60) {
                title = '不错！👍';
                message = '继续努力，你会更棒！';
            } else {
                title = '加油！💪';
                message = '多复习几遍吧！';
            }
            
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;
            
            var mascot = document.getElementById('resultMascot');
            mascot.src = randomPanda();
            mascot.onerror = function() { this.style.display = 'none'; };
            
            // 保存统计
            var stats = JSON.parse(localStorage.getItem('bioStats') || '{"score":0,"streak":0,"total":0}');
            stats.score += score;
            stats.total += currentQuestions.length;
            var today = new Date().toDateString();
            if (localStorage.getItem('lastDate') !== today) {
                stats.streak++;
                localStorage.setItem('lastDate', today);
            }
            localStorage.setItem('bioStats', JSON.stringify(stats));
        }
        
        function restartQuiz() {
            startQuiz('choice');
        }
        
        function goHome() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('homeScreen').style.display = 'flex';
            
            var stats = JSON.parse(localStorage.getItem('bioStats') || '{"score":0,"streak":0,"total":0}');
            document.getElementById('totalScore').textContent = stats.score;
            document.getElementById('streakDays').textContent = stats.streak;
            document.getElementById('totalQuestions').textContent = stats.total;
        }
        
        // 页面加载完成
        goHome();
    </script>
</body>
</html>
