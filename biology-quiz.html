<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生物会考冲刺刷题</title>
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="生物会考">
    <link rel="apple-touch-icon" href="image/biology.png">
    
    <!-- 离线支持 -->
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* 首页 */
        .home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .mascot {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
            background: white;
            padding: 10px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .app-title {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .app-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(240,147,251,0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-icon {
            width: 24px;
            height: 24px;
        }

        /* 答题页面 */
        .quiz-screen {
            display: none;
        }

        .quiz-header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .progress-container {
            margin-bottom: 15px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .quiz-stats {
            display: flex;
            justify-content: space-around;
        }

        .quiz-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .quiz-stat-icon {
            font-size: 18px;
        }

        .question-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .question-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .question-type {
            background: #f0f0f0;
            color: #666;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }

        .question-text {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 20px;
        }

        .question-image {
            width: 100%;
            border-radius: 10px;
            margin: 15px 0;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            background: white;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option-btn.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .option-btn.wrong {
            border-color: #f44336;
            background: #ffebee;
        }

        .option-letter {
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #666;
        }

        .option-btn.selected .option-letter {
            background: #667eea;
            color: white;
        }

        .option-btn.correct .option-letter {
            background: #4caf50;
            color: white;
        }

        .option-btn.wrong .option-letter {
            background: #f44336;
            color: white;
        }

        .option-text {
            flex: 1;
            padding-top: 2px;
        }

        .answer-input {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.6;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .submit-btn:active {
            transform: scale(0.95);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 反馈页面 */
        .feedback-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }

        .feedback-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .feedback-mascot {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            background: #f0f0f0;
        }

        .feedback-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .feedback-title.correct {
            color: #4caf50;
        }

        .feedback-title.wrong {
            color: #f44336;
        }

        .feedback-points {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
        }

        .explanation {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.8;
            color: #555;
        }

        .explanation-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .next-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        /* 结果页面 */
        .result-screen {
            display: none;
            text-align: center;
        }

        .result-card {
            background: white;
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .result-mascot {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            background: #f0f0f0;
        }

        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .result-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .result-detail {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
        }

        .result-detail-item {
            text-align: center;
        }

        .result-detail-number {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .result-detail-number.correct {
            color: #4caf50;
        }

        .result-detail-number.wrong {
            color: #f44336;
        }

        .result-detail-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .result-message {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin: 20px 0;
        }

        /* 连击效果 */
        .combo-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #f093fb;
            text-shadow: 0 0 20px rgba(240,147,251,0.5);
            animation: comboAnim 1s ease-out forwards;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes comboAnim {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) translateY(-50px);
            }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .app-title {
                font-size: 26px;
            }

            .question-text {
                font-size: 15px;
            }

            .option-btn {
                padding: 12px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div class="home-screen" id="homeScreen">
            <img src="image/panda%20mascot%20character%20waving.png" alt="熊猫吉祥物" class="mascot" onerror="this.style.display='none'">
            <h1 class="app-title">生物会考冲刺</h1>
            <p class="app-subtitle">易错题专项训练，助你轻松过关！</p>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-number" id="totalScore">0</span>
                    <div class="stat-label">总积分</div>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="streakDays">0</span>
                    <div class="stat-label">连续天数</div>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalQuestions">0</span>
                    <div class="stat-label">做题总数</div>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="startQuiz('choice')">
                <span>📝</span>
                <span>选择题闯关</span>
            </button>
            
            <button class="btn btn-secondary" onclick="startQuiz('essay')">
                <span>✍️</span>
                <span>解答题闯关</span>
            </button>
            
            <button class="btn btn-secondary" onclick="startQuiz('random')">
                <span>🎲</span>
                <span>随机挑战</span>
            </button>
        </div>

        <!-- 答题页面 -->
        <div class="quiz-screen" id="quizScreen">
            <div class="quiz-header">
                <div class="progress-container">
                    <div class="progress-text">
                        <span id="progressText">第 1 题 / 共 10 题</span>
                        <span id="scoreText">积分: 0</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="quiz-stats">
                    <div class="quiz-stat">
                        <span class="quiz-stat-icon">✓</span>
                        <span>正确: <span id="correctCount">0</span></span>
                    </div>
                    <div class="quiz-stat">
                        <span class="quiz-stat-icon">✗</span>
                        <span>错误: <span id="wrongCount">0</span></span>
                    </div>
                    <div class="quiz-stat">
                        <span class="quiz-stat-icon">🔥</span>
                        <span>连击: <span id="comboCount">0</span></span>
                    </div>
                </div>
            </div>

            <div class="question-container" id="questionContainer">
                <!-- 题目内容将动态生成 -->
            </div>

            <div class="feedback-container" id="feedbackContainer">
                <!-- 反馈内容将动态生成 -->
            </div>
        </div>

        <!-- 结果页面 -->
        <div class="result-screen" id="resultScreen">
            <div class="result-card">
                <img src="image/panda%20mascot%20character,%20Light.png" alt="结果熊猫" class="result-mascot" id="resultMascot" onerror="this.style.display='none'">
                <h2 class="result-title" id="resultTitle">挑战完成！</h2>
                <div class="result-score" id="resultScore">80分</div>
                
                <div class="result-detail">
                    <div class="result-detail-item">
                        <span class="result-detail-number correct" id="resultCorrect">8</span>
                        <div class="result-detail-label">答对题数</div>
                    </div>
                    <div class="result-detail-item">
                        <span class="result-detail-number wrong" id="resultWrong">2</span>
                        <div class="result-detail-label">答错题数</div>
                    </div>
                    <div class="result-detail-item">
                        <span class="result-detail-number" style="color: #667eea" id="resultAccuracy">80%</span>
                        <div class="result-detail-label">正确率</div>
                    </div>
                </div>
                
                <p class="result-message" id="resultMessage">继续努力，你会更棒的！</p>
                
                <button class="btn btn-primary" onclick="restartQuiz()">
                    <span>🔄</span>
                    <span>再来一轮</span>
                </button>
                
                <button class="btn btn-secondary" onclick="goHome()">
                    <span>🏠</span>
                    <span>返回首页</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 题库数据
        const choiceQuestions = [
            {
                id: 1,
                question: "把番茄用开水烫一下，可以从其表面撕下一层皮，这层皮和里面的果肉在植物体的结构层次上分别属于（  ）",
                options: ["上皮组织、薄壁组织", "保护组织、薄壁组织", "果皮组织、输导组织", "表皮组织、分生组织"],
                answer: 1,
                analysis: "植物的组织主要有分生组织、保护组织、营养组织、输导组织和机械组织等。把番茄用开水烫一下，可以从其表面撕下一层皮，这层皮不属于上皮组织，而属于保护组织，因为上皮组织是动物的组织，植物没有上皮组织。里面的果肉属于营养组织（薄壁组织）。"
            },
            {
                id: 2,
                question: "人工智能发展迅猛，人脸识别、人脸支付等逐渐进入人们的生活，这是由于人体面部存在差异，不易改变也不易被复制，下列与人体面部差异的形成有关的细胞结构是（  ）",
                options: ["细胞壁", "细胞膜", "细胞核", "细胞质"],
                answer: 2,
                analysis: "细胞核是细胞遗传性和细胞代谢活动的控制中心，遗传物质能经复制后传给子代，同时遗传物质还必须将其控制的生物性状特征表现出来，这些遗传物质绝大部分都存在于细胞核中。因此与人体面部差异的形成有关的细胞结构是细胞核。"
            },
            {
                id: 3,
                question: "蒲草生活在水中。经检测发现，某有毒物质在其细胞内的浓度远远低于周围污水中的浓度。控制该有毒物质进入蒲草细胞的结构是（  ）",
                options: ["细胞壁", "细胞膜", "细胞质", "细胞核"],
                answer: 1,
                analysis: "细胞膜将细胞内部与外部的环境分隔开来，使细胞拥有一个比较稳定的内部环境。能够让细胞生活需要的物质进入细胞，而把有些物质挡在细胞外面，同时，还能把细胞内产生的废物排到细胞外。"
            },
            {
                id: 4,
                question: "我国在"嫦娥四号"上搭载了棉花，油菜，土豆，拟南芥，酵母和果蝇六种生物做样本，下列有关动植物体结构层次的描述，错误的是（  ）",
                options: [
                    "棉花、油菜和拟南芥植株的结构层次都是：细胞→组织→器官→植物体",
                    "土豆在结构层次上属于器官，是营养器官",
                    "棉花的结构层次与果蝇的结构层次相比缺少了系统层次",
                    "棉花种子的种皮属于上皮组织，具有保护作用"
                ],
                answer: 3,
                analysis: "棉花种子的种皮属于保护组织，具有保护作用，而不是上皮组织。上皮组织是动物的组织。"
            },
            {
                id: 5,
                question: "下列细胞中，能观察到叶绿体的是（  ）",
                options: ["酵母菌", "洋葱鳞片叶内表皮细胞", "蚕豆叶片细胞", "人口腔上皮细胞"],
                answer: 2,
                analysis: "蚕豆叶片细胞含有叶绿体，能进行光合作用。酵母菌属于真菌无叶绿体；洋葱鳞片叶内表皮细胞不能见光不具有叶绿体；人口腔上皮细胞属于动物细胞不具有叶绿体。"
            },
            {
                id: 6,
                question: "如果你的皮肤不慎被划破，你会感到疼，会流血。"感到疼"和"会流血"是因为皮肤中有（  ）",
                options: ["肌肉组织和神经组织", "上皮组织和结缔组织", "神经组织和结缔组织", "上皮组织和神经组织"],
                answer: 2,
                analysis: "人体的组织主要有上皮组织、肌肉组织、神经组织、结缔组织等。皮肤不慎被划破会流血，说明皮肤有结缔组织；感觉到疼痛，说明有神经组织。"
            },
            {
                id: 7,
                question: "用显微镜观察字母"d"的玻片，从目镜内看到的物像是（  ）",
                options: ["p", "q", "b", "d"],
                answer: 0,
                analysis: "显微镜看到的物像不但上下颠倒，左右也颠倒。根据显微镜的成像特点，可以判断："p"是"d"旋转180度后得到的像。"
            },
            {
                id: 8,
                question: "在细胞分裂过程中，能够保证细胞分裂前后遗传物质的稳定，下列相关叙述正确的是（  ）",

                    <span class="question-type">${isChoice ? '选择题' : '解答题'}</span>
                </div>
                <div class="question-text">${question.question.replace(/\n/g, '<br>')}</div>
            `;

            // 显示图片
            if (question.images) {
                question.images.forEach(img => {
                    html += `<img src="${img}" class="question-image" alt="题目图片" onerror="this.style.display='none'">`;
                });
            }

            if (isChoice) {
                html += '<div class="options-container">';
                const letters = ['A', 'B', 'C', 'D'];
                question.options.forEach((opt, idx) => {
                    html += `
                        <button class="option-btn" onclick="selectOption(${idx})">
                            <span class="option-letter">${letters[idx]}</span>
                            <span class="option-text">${opt}</span>
                        </button>
                    `;
                });
                html += '</div>';
            } else {
                html += `
                    <textarea class="answer-input" id="essayAnswer" placeholder="请在此输入你的答案..."></textarea>
                    <button class="submit-btn" onclick="submitEssay()">提交答案</button>
                `;
            }

            container.innerHTML = html;
        }

        // 选择题选择选项
        function selectOption(index) {
            const question = currentQuestions[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            // 禁用所有按钮
            buttons.forEach(btn => btn.style.pointerEvents = 'none');

            // 标记选择的答案
            buttons[index].classList.add('selected');

            setTimeout(() => {
                // 显示正确答案
                buttons[question.answer].classList.add('correct');
                
                if (index !== question.answer) {
                    buttons[index].classList.add('wrong');
                    showFeedback(false, question);
                } else {
                    showFeedback(true, question);
                }
            }, 300);
        }

        // 提交解答题
        function submitEssay() {
            const question = currentQuestions[currentIndex];
            const answer = document.getElementById('essayAnswer').value.trim();
            
            // 简单判断（检查关键词）
            let matchedKeywords = 0;
            if (question.keywords) {
                question.keywords.forEach(keyword => {
                    if (answer.includes(keyword)) {
                        matchedKeywords++;
                    }
                });
            }
            
            const isCorrect = matchedKeywords >= question.keywords.length / 2;
            
            showFeedback(isCorrect, question);
        }

        // 显示反馈
        function showFeedback(isCorrect, question) {
            const feedback = document.getElementById('feedbackContainer');
            const container = document.getElementById('questionContainer');
            
            container.style.display = 'none';
            feedback.style.display = 'block';

            if (isCorrect) {
                correctCount++;
                combo++;
                const points = 10 + (combo > 1 ? combo * 2 : 0);
                score += points;
                
                feedback.innerHTML = `
                    <div class="feedback-header">
                        <img src="image/panda%20mascot%20character%20giving.png" alt="鼓励熊猫" class="feedback-mascot" onerror="this.style.display='none'">
                        <div class="feedback-title correct">太棒了！</div>
                        <div class="feedback-points">+${points} 积分</div>
                    </div>
                    <div class="explanation">
                        <div class="explanation-title">💡 解析</div>
                        ${question.analysis.replace(/\n/g, '<br>')}
                    </div>
                    <button class="next-btn" onclick="nextQuestion()">下一题 →</button>
                `;

                if (combo >= 3) {
                    showComboEffect(combo);
                }
            } else {
                wrongCount++;
                combo = 0;
                
                feedback.innerHTML = `
                    <div class="feedback-header">
                        <img src="image/panda%20thinking.png" alt="思考熊猫" class="feedback-mascot" onerror="this.style.display='none'">
                        <div class="feedback-title wrong">继续加油！</div>
                    </div>
                    <div class="explanation">
                        <div class="explanation-title">✓ 正确答案</div>
                        <div style="margin-bottom: 15px; color: #4caf50; font-weight: bold;">${question.answer || '（见解析）'}</div>
                        <div class="explanation-title">💡 解析</div>
                        ${question.analysis.replace(/\n/g, '<br>')}
                    </div>
                    <button class="next-btn" onclick="nextQuestion()">下一题 →</button>
                `;
            }

            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('comboCount').textContent = combo;
            document.getElementById('scoreText').textContent = `积分: ${score}`;
        }

        // 下一题
        function nextQuestion() {
            currentIndex++;
            
            if (currentIndex >= currentQuestions.length) {
                showResult();
            } else {
                displayQuestion();
            }
        }

        // 显示结果
        function showResult() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'flex';

            const accuracy = Math.round((correctCount / currentQuestions.length) * 100);
            
            document.getElementById('resultScore').textContent = `${score} 分`;
            document.getElementById('resultCorrect').textContent = correctCount;
            document.getElementById('resultWrong').textContent = wrongCount;
            document.getElementById('resultAccuracy').textContent = `${accuracy}%`;

            // 根据成绩显示不同的熊猫和文案
            let mascot, title, message;
            if (accuracy >= 90) {
                mascot = 'image/panda%20mascot%20character,%20Light.png';
                title = '太优秀了！🎉';
                message = '你已经掌握了这些知识点，继续保持！';
            } else if (accuracy >= 70) {
                mascot = 'image/happy%20panda.png';
                title = '表现不错！👍';
                message = '再努力一下，你会更棒的！';
            } else {
                mascot = 'image/panda%20thinking.png';
                title = '继续努力！💪';
                message = '多复习几遍，这些知识点都很重要哦！';
            }

            document.getElementById('resultMascot').src = mascot;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;

            // 更新总数据
            updateStats();
        }

        // 显示连击效果
        function showComboEffect(count) {
            const effect = document.createElement('div');
            effect.className = 'combo-effect';
            effect.textContent = `🔥 ${count}连击！`;
            document.body.appendChild(effect);
            
            setTimeout(() => {
                effect.remove();
            }, 1000);
        }

        // 更新统计数据
        function updateStats() {
            const stats = JSON.parse(localStorage.getItem('biologyQuizStats') || '{"score":0,"streak":0,"total":0}');
            stats.score += score;
            stats.total += currentQuestions.length;
            stats.streak = stats.streak || 0;
            
            // 检查是否今天已经做题
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('lastQuizDate');
            if (lastDate !== today) {
                stats.streak++;
                localStorage.setItem('lastQuizDate', today);
            }
            
            localStorage.setItem('biologyQuizStats', JSON.stringify(stats));
            
            document.getElementById('totalScore').textContent = stats.score;
            document.getElementById('streakDays').textContent = stats.streak;
            document.getElementById('totalQuestions').textContent = stats.total;
        }

        // 重新开始
        function restartQuiz() {
            startQuiz(quizType);
        }

        // 返回首页
        function goHome() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('homeScreen').style.display = 'flex';
            
            // 加载统计数据
            const stats = JSON.parse(localStorage.getItem('biologyQuizStats') || '{"score":0,"streak":0,"total":0}');
            document.getElementById('totalScore').textContent = stats.score;
            document.getElementById('streakDays').textContent = stats.streak;
            document.getElementById('totalQuestions').textContent = stats.total;
        }

        // 数组随机排序
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 初始化
        window.onload = function() {
            goHome();
            registerServiceWorker();
        };

        // 注册 Service Worker
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                        
                        // 检查更新
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // 新版本可用，提示用户刷新
                                    if (confirm('发现新版本，是否立即更新？')) {
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('Service Worker 注册失败:', error);
                    });
            }
        }
    </script>
</body>
</html>
