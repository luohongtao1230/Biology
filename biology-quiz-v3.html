<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生物会考冲刺刷题</title>
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="生物会考">
    <link rel="apple-touch-icon" href="image/biology.png">
    
    <!-- 离线支持 -->
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* 首页 */
        .home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .mascot {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
            background: white;
            padding: 10px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .app-title {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .app-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(240,147,251,0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 答题页面 */
        .quiz-screen {
            display: none;
        }

        /* 答题页面顶部吉祥物 */
        .quiz-mascot {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
            display: block;
            animation: bounce 2s infinite;
            background: white;
            padding: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .quiz-header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .progress-container {
            margin-bottom: 15px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .quiz-stats {
            display: flex;
            justify-content: space-around;
        }

        .quiz-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .question-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .question-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .question-type {
            background: #f0f0f0;
            color: #666;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }

        .question-text {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 20px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            background: white;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option-btn.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .option-btn.wrong {
            border-color: #f44336;
            background: #ffebee;
        }

        .option-letter {
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #666;
        }

        .option-btn.selected .option-letter {
            background: #667eea;
            color: white;
        }

        .option-btn.correct .option-letter {
            background: #4caf50;
            color: white;
        }

        .option-btn.wrong .option-letter {
            background: #f44336;
            color: white;
        }

        .option-text {
            flex: 1;
            padding-top: 2px;
        }

        /* 底部导航按钮 */
        .navigation-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .nav-btn-prev {
            background: #f0f0f0;
            color: #666;
        }

        .nav-btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-btn-home {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 反馈页面 */
        .feedback-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }

        .feedback-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .feedback-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .feedback-title.correct {
            color: #4caf50;
        }

        .feedback-title.wrong {
            color: #f44336;
        }

        .feedback-points {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
        }

        .explanation {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.8;
            color: #555;
        }

        .explanation-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 15px;
        }

        /* 结果页面 */
        .result-screen {
            display: none;
            text-align: center;
        }

        .result-card {
            background: white;
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .result-mascot {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            background: #f0f0f0;
        }

        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .result-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .result-detail {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
        }

        .result-detail-item {
            text-align: center;
        }

        .result-detail-number {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .result-detail-number.correct {
            color: #4caf50;
        }

        .result-detail-number.wrong {
            color: #f44336;
        }

        .result-detail-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .result-message {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin: 20px 0;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .app-title {
                font-size: 26px;
            }

            .question-text {
                font-size: 15px;
            }

            .option-btn {
                padding: 12px 15px;
                font-size: 14px;
            }

            .navigation-buttons {
                flex-wrap: wrap;
            }

            .nav-btn {
                font-size: 13px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div class="home-screen" id="homeScreen">
            <img src="image/panda%20mascot%20character%20waving.png" alt="熊猫吉祥物" class="mascot" onerror="this.style.display='none'">
            <h1 class="app-title">生物会考冲刺</h1>
            <p class="app-subtitle">易错题专项训练，助你轻松过关！</p>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-number" id="totalScore">0</span>
                    <div class="stat-label">总积分</div>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="streakDays">0</span>
                    <div class="stat-label">连续天数</div>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalQuestions">0</span>
                    <div class="stat-label">做题总数</div>
                </div>
            </div>
            
            <button class="btn btn-primary" id="btnChoice">
                <span>📝</span>
                <span>选择题闯关</span>
            </button>
            
            <button class="btn btn-secondary" id="btnEssay">
                <span>✍️</span>
                <span>解答题闯关</span>
            </button>
            
            <button class="btn btn-secondary" id="btnRandom">
                <span>🎲</span>
                <span>随机挑战</span>
            </button>
        </div>

        <!-- 答题页面 -->
        <div class="quiz-screen" id="quizScreen">
            <!-- 随机吉祥物 -->
            <img src="" alt="吉祥物" class="quiz-mascot" id="quizMascot">
            
            <div class="quiz-header">
                <div class="progress-container">
                    <div class="progress-text">
                        <span id="progressText">第 1 题 / 共 10 题</span>
                        <span id="scoreText">积分: 0</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="quiz-stats">
                    <div class="quiz-stat">
                        <span>✓ 正确: <span id="correctCount">0</span></span>
                    </div>
                    <div class="quiz-stat">
                        <span>✗ 错误: <span id="wrongCount">0</span></span>
                    </div>
                    <div class="quiz-stat">
                        <span>🔥 连击: <span id="comboCount">0</span></span>
                    </div>
                </div>
            </div>

            <div class="question-container" id="questionContainer">
                <!-- 题目内容将动态生成 -->
            </div>

            <!-- 底部导航按钮 -->
            <div class="navigation-buttons" id="navigationButtons">
                <button class="nav-btn nav-btn-prev" id="btnPrev">
                    <span>←</span>
                    <span>上一题</span>
                </button>
                <button class="nav-btn nav-btn-next" id="btnNextNav">
                    <span>下一题</span>
                    <span>→</span>
                </button>
                <button class="nav-btn nav-btn-home" id="btnHomeNav">
                    <span>🏠</span>
                    <span>主页</span>
                </button>
            </div>

            <div class="feedback-container" id="feedbackContainer">
                <!-- 反馈内容将动态生成 -->
            </div>
        </div>

        <!-- 结果页面 -->
        <div class="result-screen" id="resultScreen">
            <div class="result-card">
                <img src="image/panda%20mascot%20character,%20Light.png" alt="结果熊猫" class="result-mascot" id="resultMascot" onerror="this.style.display='none'">
                <h2 class="result-title" id="resultTitle">挑战完成！</h2>
                <div class="result-score" id="resultScore">80分</div>
                
                <div class="result-detail">
                    <div class="result-detail-item">
                        <span class="result-detail-number correct" id="resultCorrect">8</span>
                        <div class="result-detail-label">答对题数</div>
                    </div>
                    <div class="result-detail-item">
                        <span class="result-detail-number wrong" id="resultWrong">2</span>
                        <div class="result-detail-label">答错题数</div>
                    </div>
                    <div class="result-detail-item">
                        <span class="result-detail-number" style="color: #667eea" id="resultAccuracy">80%</span>
                        <div class="result-detail-label">正确率</div>
                    </div>
                </div>
                
                <p class="result-message" id="resultMessage">继续努力，你会更棒的！</p>
                
                <button class="btn btn-primary" id="btnRestart">
                    <span>🔄</span>
                    <span>再来一轮</span>
                </button>
                
                <button class="btn btn-secondary" id="btnHome">
                    <span>🏠</span>
                    <span>返回首页</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ========== 题库数据 ==========
        const choiceQuestions = [
            {
                id: 1,
                question: "把番茄用开水烫一下，可以从其表面撕下一层皮，这层皮和里面的果肉在植物体的结构层次上分别属于（  ）",
                options: ["上皮组织、薄壁组织", "保护组织、薄壁组织", "果皮组织、输导组织", "表皮组织、分生组织"],
                answer: 1,
                analysis: "植物的组织主要有分生组织、保护组织、营养组织、输导组织和机械组织等。把番茄用开水烫一下，可以从其表面撕下一层皮，这层皮不属于上皮组织，而属于保护组织，因为上皮组织是动物的组织，植物没有上皮组织。里面的果肉属于营养组织（薄壁组织）。"
            },
            {
                id: 2,
                question: "人工智能发展迅猛，人脸识别、人脸支付等逐渐进入人们的生活，这是由于人体面部存在差异，不易改变也不易被复制，下列与人体面部差异的形成有关的细胞结构是（  ）",
                options: ["细胞壁", "细胞膜", "细胞核", "细胞质"],
                answer: 2,
                analysis: "细胞核是细胞遗传性和细胞代谢活动的控制中心，遗传物质能经复制后传给子代，同时遗传物质还必须将其控制的生物性状特征表现出来，这些遗传物质绝大部分都存在于细胞核中。因此与人体面部差异的形成有关的细胞结构是细胞核。"
            },
            {
                id: 3,
                question: "蒲草生活在水中。经检测发现，某有毒物质在其细胞内的浓度远远低于周围污水中的浓度。控制该有毒物质进入蒲草细胞的结构是（  ）",
                options: ["细胞壁", "细胞膜", "细胞质", "细胞核"],
                answer: 1,
                analysis: "细胞膜将细胞内部与外部的环境分隔开来，使细胞拥有一个比较稳定的内部环境。能够让细胞生活需要的物质进入细胞，而把有些物质挡在细胞外面，同时，还能把细胞内产生的废物排到细胞外。"
            },
            {
                id: 4,
                question: "我国在"嫦娥四号"上搭载了棉花，油菜，土豆，拟南芥，酵母和果蝇六种生物做样本，下列有关动植物体结构层次的描述，错误的是（  ）",
                options: [
                    "棉花、油菜和拟南芥植株的结构层次都是：细胞→组织→器官→植物体",
                    "土豆在结构层次上属于器官，是营养器官",
                    "棉花的结构层次与果蝇的结构层次相比缺少了系统层次",
                    "棉花种子的种皮属于上皮组织，具有保护作用"
                ],
                answer: 3,
                analysis: "棉花种子的种皮属于保护组织，具有保护作用，而不是上皮组织。上皮组织是动物的组织。"
            },
            {
                id: 5,
                question: "下列细胞中，能观察到叶绿体的是（  ）",
                options: ["酵母菌", "洋葱鳞片叶内表皮细胞", "蚕豆叶片细胞", "人口腔上皮细胞"],
                answer: 2,
                analysis: "蚕豆叶片细胞含有叶绿体，能进行光合作用。酵母菌属于真菌无叶绿体；洋葱鳞片叶内表皮细胞不能见光不具有叶绿体；人口腔上皮细胞属于动物细胞不具有叶绿体。"
            },
            {
                id: 6,
                question: "如果你的皮肤不慎被划破，你会感到疼，会流血。"感到疼"和"会流血"是因为皮肤中有（  ）",
                options: ["肌肉组织和神经组织", "上皮组织和结缔组织", "神经组织和结缔组织", "上皮组织和神经组织"],
                answer: 2,
                analysis: "人体的组织主要有上皮组织、肌肉组织、神经组织、结缔组织等。皮肤不慎被划破会流血，说明皮肤有结缔组织；感觉到疼痛，说明有神经组织。"
            },
            {
                id: 7,
                question: "用显微镜观察字母"d"的玻片，从目镜内看到的物像是（  ）",
                options: ["p", "q", "b", "d"],
                answer: 0,
                analysis: "显微镜看到的物像不但上下颠倒，左右也颠倒。根据显微镜的成像特点，可以判断："p"是"d"旋转180度后得到的像。"
            },
            {
                id: 8,
                question: "在细胞分裂过程中，能够保证细胞分裂前后遗传物质的稳定，下列相关叙述正确的是（  ）",
                options: ["染色体复制", "细胞质的平均分配", "两个新细胞核的形成", "染色体先复制加倍再平均分配"],
                answer: 3,
                analysis: "细胞的遗传物质主要存在于细胞核中的染色体上。细胞分裂时，染色体的数量在细胞分裂时已经加倍，在细胞分裂过程中，染色体分成完全相同的两份，分别进入两个子细胞中，两个子细胞的染色体形态和数目相同，子细胞和原细胞所含有的遗传物质是一样的。"
            },
            {
                id: 9,
                question: "分类学家以生物性状的差异程度和亲缘关系的远近对生物加以分门别类，并遵循这个原则创立了生物分类的阶层系统，在分类系统中最基本的分类单位是（  ）",
                options: ["界", "门", "科", "种"],
                answer: 3,
                analysis: "生物分类单位由大到小是界、门、纲、目、科、属、种。界是最大的分类单位，最基本的分类单位是种。"
            },
            {
                id: 10,
                question: "下列分类等级中，生物之间亲缘关系最密切的是（  ）",
                options: ["门", "纲", "科", "种"],
                answer: 3,
                analysis: "生物的分类单位从大到小依次以界、门、纲、目、科、属、种，生物所属的等级越大，生物之间的亲缘关系越远，生物所属的等级越小，生物的亲缘关系越近。种是最小的分类单位。"
            }
        ];

        const essayQuestions = [
            {
                id: 1,
                question: "为研究生物细胞的结构特点，某生物兴趣小组用图甲所示的显微镜观察到图乙所示的细胞结构。\n\n（1）该组成员知画已经观察到物像，为了使看到的物像更清晰，你认为应该调节图甲中的____。（填序号）\n\n（2）该小组中有男生，也有女生，请问决定他们性别的遗传物质位于图乙中的____。（填字母）",
                answer: "（1）⑥；（2）B",
                analysis: "（1）细准焦螺旋的作用是较小幅度的升降镜筒外，还能调出更加清晰的物像。\n（2）细胞核是遗传物质的控制中心。",
                keywords: ["⑥", "B"]
            },
            {
                id: 2,
                question: "神舟十八号载人飞船带了斑马鱼、金鱼藻两种特殊生物到太空，这两种生物被养殖在小型受控生命生态实验模块中。请回答：\n\n（1）构成斑马鱼和金鱼藻结构和功能的基本单位都是____，但从生物体的结构层次上看，斑马鱼具有而金鱼藻不具有的层次是____。\n\n（2）虽然目前该生态系统还不能完全实现物质和能量的自给自足，但斑马鱼和金鱼藻两种生物却能在部分物质上互为补给，图中①和②代表的物质分别是____和____。",
                answer: "（1）细胞；系统；（2）氧气；二氧化碳",
                analysis: "（1）除病毒外，所有生物都是由细胞构成的。动物体的结构层次为：细胞→组织→器官→系统→动物体；植物体的结构层次为：细胞→组织→器官→植物体。\n（2）光合作用吸收二氧化碳并释放氧气，呼吸作用吸收氧气并释放二氧化碳。",
                keywords: ["细胞", "系统", "氧气", "二氧化碳"]
            }
        ];

        // ========== 熊猫图片列表 ==========
        const pandaImages = [
            'image/panda%20mascot%20character%20waving.png',
            'image/panda%20mascot%20character%20sitting.png',
            'image/panda%20mascot%20character%20giving.png',
            'image/panda%20mascot%20character%20wearing.png',
            'image/panda%20mascot%20character,%20Light.png',
            'image/panda%20mascot%20character,%20Light2.png',
            'image/panda%20mascot%20character,%20Light3.png',
            'image/panda%20mascot%20character,%20Light4.png',
            'image/panda%20thinking.png',
            'image/panda%20thinking2.png',
            'image/happy%20panda.png',
            'image/happy%20panda1.png',
            'image/happy%20panda2.png',
            'image/scientist%20panda.png'
        ];

        // ========== 全局变量 ==========
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let combo = 0;
        let quizType = '';
        let answeredQuestions = []; // 记录已答题目的答案

        // ========== 工具函数 ==========
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function getRandomPandaImage() {
            return pandaImages[Math.floor(Math.random() * pandaImages.length)];
        }

        // ========== 核心函数 ==========
        function startQuiz(type) {
            console.log('startQuiz called with type:', type);
            
            quizType = type;
            currentIndex = 0;
            score = 0;
            correctCount = 0;
            wrongCount = 0;
            combo = 0;
            answeredQuestions = new Array(currentQuestions.length).fill(null);

            // 根据类型选择题目
            if (type === 'choice') {
                currentQuestions = shuffleArray([...choiceQuestions]).slice(0, Math.min(10, choiceQuestions.length));
            } else if (type === 'essay') {
                currentQuestions = shuffleArray([...essayQuestions]).slice(0, Math.min(6, essayQuestions.length));
            } else {
                const allQuestions = [...choiceQuestions, ...essayQuestions];
                currentQuestions = shuffleArray(allQuestions).slice(0, Math.min(10, allQuestions.length));
            }

            // 初始化答案记录
            answeredQuestions = new Array(currentQuestions.length).fill(null);

            console.log('Questions loaded:', currentQuestions.length);

            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';

            displayQuestion();
        }

        function displayQuestion() {
            const question = currentQuestions[currentIndex];
            const container = document.getElementById('questionContainer');
            const feedback = document.getElementById('feedbackContainer');
            
            feedback.style.display = 'none';
            container.style.display = 'block';

            // 更新随机熊猫图片
            const mascotImg = document.getElementById('quizMascot');
            mascotImg.src = getRandomPandaImage();
            mascotImg.onerror = function() { this.style.display = 'none'; };
            mascotImg.style.display = 'block';

            // 更新进度
            document.getElementById('progressText').textContent = `第 ${currentIndex + 1} 题 / 共 ${currentQuestions.length} 题`;
            document.getElementById('progressFill').style.width = `${(currentIndex / currentQuestions.length) * 100}%`;
            document.getElementById('scoreText').textContent = `积分: ${score}`;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('comboCount').textContent = combo;

            // 更新导航按钮状态
            updateNavigationButtons();

            // 判断题型
            const isChoice = question.options !== undefined;

            let html = `
                <div class="question-header">
                    <span class="question-number">第 ${currentIndex + 1} 题</span>
                    <span class="question-type">${isChoice ? '选择题' : '解答题'}</span>
                </div>
                <div class="question-text">${question.question.replace(/\n/g, '<br>')}</div>
            `;

            if (isChoice) {
                html += '<div class="options-container">';
                const letters = ['A', 'B', 'C', 'D'];
                question.options.forEach((opt, idx) => {
                    const answered = answeredQuestions[currentIndex];
                    let classes = 'option-btn';
                    if (answered !== null) {
                        if (idx === answered) {
                            classes += idx === question.answer ? ' correct' : ' wrong selected';
                        }
                        if (idx === question.answer) {
                            classes += ' correct';
                        }
                    }
                    html += `
                        <button class="${classes}" data-index="${idx}" ${answered !== null ? 'style="pointer-events: none"' : ''}>
                            <span class="option-letter">${letters[idx]}</span>
                            <span class="option-text">${opt}</span>
                        </button>
                    `;
                });
                html += '</div>';
            }

            container.innerHTML = html;

            // 绑定选择题按钮事件（仅未回答时）
            if (isChoice && answeredQuestions[currentIndex] === null) {
                const buttons = container.querySelectorAll('.option-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.getAttribute('data-index'));
                        selectOption(index);
                    });
                });
            }
        }

        function updateNavigationButtons() {
            const btnPrev = document.getElementById('btnPrev');
            const btnNextNav = document.getElementById('btnNextNav');
            
            // 上一题按钮：第一题时禁用
            btnPrev.disabled = currentIndex === 0;
            
            // 下一题按钮：根据是否已答题显示不同文字
            if (currentIndex === currentQuestions.length - 1) {
                btnNextNav.innerHTML = '<span>完成</span><span>✓</span>';
            } else {
                btnNextNav.innerHTML = '<span>下一题</span><span>→</span>';
            }
        }

        function selectOption(index) {
            console.log('selectOption called with index:', index);
            
            const question = currentQuestions[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            // 记录答案
            answeredQuestions[currentIndex] = index;
            
            // 禁用所有按钮
            buttons.forEach(btn => btn.style.pointerEvents = 'none');

            // 标记选择的答案
            buttons[index].classList.add('selected');

            setTimeout(() => {
                // 显示正确答案
                buttons[question.answer].classList.add('correct');
                
                if (index !== question.answer) {
                    buttons[index].classList.add('wrong');
                    wrongCount++;
                    combo = 0;
                } else {
                    correctCount++;
                    combo++;
                    const points = 10 + (combo > 1 ? combo * 2 : 0);
                    score += points;
                }
                
                // 更新统计
                document.getElementById('correctCount').textContent = correctCount;
                document.getElementById('wrongCount').textContent = wrongCount;
                document.getElementById('comboCount').textContent = combo;
                document.getElementById('scoreText').textContent = `积分: ${score}`;
            }, 300);
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            currentIndex++;
            
            if (currentIndex >= currentQuestions.length) {
                showResult();
            } else {
                displayQuestion();
            }
        }

        function showResult() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'flex';

            const accuracy = Math.round((correctCount / currentQuestions.length) * 100);
            
            document.getElementById('resultScore').textContent = `${score} 分`;
            document.getElementById('resultCorrect').textContent = correctCount;
            document.getElementById('resultWrong').textContent = wrongCount;
            document.getElementById('resultAccuracy').textContent = `${accuracy}%`;

            let title, message;
            if (accuracy >= 90) {
                title = '太优秀了！🎉';
                message = '你已经掌握了这些知识点，继续保持！';
            } else if (accuracy >= 70) {
                title = '表现不错！👍';
                message = '再努力一下，你会更棒的！';
            } else {
                title = '继续努力！💪';
                message = '多复习几遍，这些知识点都很重要哦！';
            }

            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;

            updateStats();
        }

        function updateStats() {
            const stats = JSON.parse(localStorage.getItem('biologyQuizStats') || '{"score":0,"streak":0,"total":0}');
            stats.score += score;
            stats.total += currentQuestions.length;
            
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('lastQuizDate');
            if (lastDate !== today) {
                stats.streak = (stats.streak || 0) + 1;
                localStorage.setItem('lastQuizDate', today);
            }
            
            localStorage.setItem('biologyQuizStats', JSON.stringify(stats));
            
            document.getElementById('totalScore').textContent = stats.score;
            document.getElementById('streakDays').textContent = stats.streak;
            document.getElementById('totalQuestions').textContent = stats.total;
        }

        function goHome() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('homeScreen').style.display = 'flex';
            
            const stats = JSON.parse(localStorage.getItem('biologyQuizStats') || '{"score":0,"streak":0,"total":0}');
            document.getElementById('totalScore').textContent = stats.score;
            document.getElementById('streakDays').textContent = stats.streak;
            document.getElementById('totalQuestions').textContent = stats.total;
        }

        // ========== 初始化 ==========
        window.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成');
            
            // 绑定首页按钮事件
            document.getElementById('btnChoice').addEventListener('click', function() {
                startQuiz('choice');
            });
            
            document.getElementById('btnEssay').addEventListener('click', function() {
                startQuiz('essay');
            });
            
            document.getElementById('btnRandom').addEventListener('click', function() {
                startQuiz('random');
            });
            
            // 绑定答题页面导航按钮
            document.getElementById('btnPrev').addEventListener('click', prevQuestion);
            document.getElementById('btnNextNav').addEventListener('click', nextQuestion);
            document.getElementById('btnHomeNav').addEventListener('click', goHome);
            
            // 绑定结果页面按钮
            document.getElementById('btnRestart').addEventListener('click', function() {
                startQuiz(quizType);
            });
            
            document.getElementById('btnHome').addEventListener('click', goHome);
            
            // 加载统计数据
            goHome();
            
            console.log('初始化完成');
        });
    </script>
</body>
</html>
